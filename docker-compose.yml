version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: dailyfresh_mysql
    environment:
      MYSQL_ROOT_PASSWORD: zzh2864799
      MYSQL_DATABASE: my_dailyFresh
    ports:
      - "3307:3307"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: dailyfresh_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    container_name: dailyfresh_web
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=my_daily_freshmall.settings

  celery:
    build: .
    container_name: dailyfresh_celery
    command: celery -A celery_task worker -l info
    volumes:
      - .:/app
    depends_on:
      - mysql
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=my_daily_freshmall.settings

volumes:
  mysql_data:
  redis_data: